name: Build and Deploy to Tencent Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_message:
        description: '部署说明'
        required: false
        default: '手动触发部署'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: tencent-cloud
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/"
          target: "/var/www/xiaohuodong0310"
          overwrite: true
          rm: true

      - name: Configure Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 创建Nginx配置
            cat > /etc/nginx/sites-available/xiaohuodong0310 << 'EOF'
            server {
                listen 80;
                server_name _;
                root /var/www/xiaohuodong0310;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                    access_log off;
                }

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
            }
            EOF

            # 创建软链接
            ln -sf /etc/nginx/sites-available/xiaohuodong0310 /etc/nginx/sites-enabled/

            # 测试并重载
            nginx -t && systemctl reload nginx
          script_stop: "Nginx configured and reloaded"

      - name: Verify deployment
        run: |
          echo "========================================="
          echo "  部署完成！"
          echo "========================================="
          echo ""
          echo "访问地址: http://${{ secrets.SERVER_IP }}"
          echo ""
          echo "部署时间: $(date)"
          echo "========================================="
